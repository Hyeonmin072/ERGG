name: Daily IN1000 User Data Sync

on:
  schedule:
    # 매일 KST 04:00 (UTC 19:00) 실행
    - cron: '0 19 * * *'
  workflow_dispatch:  # 수동 실행도 허용

jobs:
  sync:
    name: Sync top-1000 user data to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 3단계 합산 최대 90분
    env:
      # Node 20 deprecation 경고 줄이기 (실패 원인 아님)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Step 1: BSER API로 상위 랭킹 닉네임 수집 ────────────────
      - name: "[1/3] Fetch top rank nicknames from BSER API"
        env:
          ER_API_KEY: ${{ secrets.ER_API_KEY }}
        run: python fetch_top_rank_nicknames.py

      - name: Upload leaderboard CSV (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: top1000-nicknames-${{ github.run_id }}
          path: backend/dakgg_asia_season10_top1000.csv
          retention-days: 7
          if-no-files-found: ignore

      # ── Step 2: 닉네임 → userId 변환 (~17분) ────────────────────
      - name: "[2/3] Fetch user IDs from BSER Open API"
        env:
          ER_API_KEY: ${{ secrets.ER_API_KEY }}
        run: python fetch_user_ids_from_nicknames.py

      - name: Upload user IDs CSV (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: top1000-user-ids-${{ github.run_id }}
          path: backend/dakgg_asia_season10_user_ids.csv
          retention-days: 7
          if-no-files-found: ignore

      # ── Step 3: Supabase 동기화 ──────────────────────────────────
      - name: "[3/3] Sync match data to Supabase"
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ER_API_KEY: ${{ secrets.ER_API_KEY }}
        run: python sync_supabase_from_user_ids.py

      - name: Run database migrations
        run: python migrate_db_camelcase.py